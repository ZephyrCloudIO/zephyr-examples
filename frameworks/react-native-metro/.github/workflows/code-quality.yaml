name: Code Quality Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
          clean: true

      - name: Prepare repository
        uses: ./.github/actions/prepare-repo

      - name: Lint
        run: pnpm lint:ci

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
          clean: true

      - name: Prepare repository
        uses: ./.github/actions/prepare-repo

      - name: Typecheck
        run: pnpm typecheck
