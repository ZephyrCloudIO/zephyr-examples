name: Manual — Build All

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - production
      skip_cache:
        description: 'Force rebuild (skip turbo cache)'
        required: false
        default: true
        type: boolean
      plugin_version:
        description: 'Upgrade Zephyr plugin before build (e.g. "next", "latest", or a specific version)'
        required: false
        default: ''
        type: string
  repository_dispatch:
    types: [build-deploy-test]

concurrency:
  group: manual-${{ github.ref }}-${{ github.event.inputs.environment || github.event.client_payload.environment || 'staging' }}
  cancel-in-progress: false

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_CACHE: remote:rw
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  ZE_ENV: |
    ${{
      (github.event.inputs.environment || github.event.client_payload.environment) == 'production' && 'production' ||
      (github.event.inputs.environment || github.event.client_payload.environment) == 'dev' && 'development' ||
      'staging'
    }}
  ZE_FAIL_BUILD: true
  ZE_SECRET_TOKEN: |
    ${{
      (github.event.inputs.environment || github.event.client_payload.environment) == 'dev' && secrets.ZE_SECRET_TOKEN_DEV ||
      (github.event.inputs.environment || github.event.client_payload.environment) == 'staging' && secrets.ZE_SECRET_TOKEN_STAGING ||
      secrets.ZE_SECRET_TOKEN_PROD
    }}
  ZE_API: |
    ${{
      (github.event.inputs.environment || github.event.client_payload.environment) == 'dev' && 'https://api-dev.zephyr-cloud.io' ||
      (github.event.inputs.environment || github.event.client_payload.environment) == 'staging' && 'https://zephyr-api-prerelease-1a6b535d0499.herokuapp.com' ||
      'https://api.zephyr-cloud.io'
    }}
  ZE_API_GATE: |
    ${{
      (github.event.inputs.environment || github.event.client_payload.environment) == 'dev' && 'https://zeapi.zephyrcloudapp.dev' ||
      (github.event.inputs.environment || github.event.client_payload.environment) == 'staging' && 'https://zeapi.zephyrcloudapp.xyz' ||
      'https://zeapi.zephyrcloud.app'
    }}
  USE_ZEPHYR_DEPLOY: true

jobs:
  build-all:
    name: Build all workspace examples
    timeout-minutes: 60
    runs-on: depot-ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 📦 Setup Node & PNPM
        uses: ./.github/actions/setup-node

      - name: ⬆️ Upgrade Zephyr plugins
        if: ${{ github.event.inputs.plugin_version != '' || github.event.client_payload.plugin_version != '' }}
        run: |
          VERSION="${{ github.event.inputs.plugin_version || github.event.client_payload.plugin_version }}"
          echo "Upgrading Zephyr plugins to: ${VERSION}"
          pnpm --filter @zephyr-examples/scripts upgrade-plugins --version="${VERSION}"
          pnpm install --no-frozen-lockfile

      - name: 🏗️ Build all workspace examples
        run: |
          if [ "${{ github.event.inputs.skip_cache || github.event.client_payload.skip_cache }}" = "true" ]; then
            pnpm exec turbo build --force
          else
            pnpm exec turbo build
          fi

  build-standalones:
    name: Standalone ${{ matrix.example }}
    timeout-minutes: 60
    runs-on: depot-ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - build-systems/nx-rspack-mf
          - build-systems/turborepo-rspack-mf
          - module-federation/airbnb-clone
          - module-federation/react-vite-rspack-webpack
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.6.3

      - name: 🟢 Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: ${{ matrix.example }}/pnpm-lock.yaml

      - name: 📥 Install ${{ matrix.example }}
        run: pnpm install --prefer-offline
        working-directory: ${{ matrix.example }}

      - name: 🏗️ Build ${{ matrix.example }}
        run: pnpm build
        working-directory: ${{ matrix.example }}

  validate:
    name: Validate deployments
    needs: [build-all, build-standalones]
    if: always() && needs.build-all.result == 'success'
    timeout-minutes: 15
    runs-on: depot-ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 📦 Setup Node & PNPM
        uses: ./.github/actions/setup-node

      - name: ⏳ Wait for edge propagation
        run: sleep 60

      - name: 🎭 Install Playwright browsers
        run: pnpm --filter @zephyr-examples/scripts exec playwright install chromium

      - name: 🧪 Run deployment validation
        run: pnpm --filter @zephyr-examples/scripts test
        env:
          CI: true

      - name: 📋 Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: validation-results-${{ github.event.inputs.environment || github.event.client_payload.environment }}
          path: |
            scripts/test-results/
            scripts/playwright-report/
          retention-days: 7
