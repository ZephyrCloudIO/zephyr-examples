name: Setup Node and PNPM
description: Sets up Node.js and PNPM with caching

inputs:
  os:
    required: true
    description: "Operating system"
    default: ubuntu-latest
  node-version:
    required: true
    description: "Node.js version"
    default: "24"

runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v4
      with:
        run_install: false
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"
        cache-dependency-path: "**/pnpm-lock.yaml"
        registry-url: "https://registry.npmjs.org"
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
    - name: Install workspace dependencies
      shell: bash
      run: pnpm install --prefer-offline

    - name: Install standalone example dependencies
      shell: bash
      run: |
        standalone=(
          build-systems/nx-rspack-mf
          build-systems/turborepo-rspack-mf
          module-federation/airbnb-clone
          module-federation/react-vite-rspack-webpack
        )
        for example in "${standalone[@]}"; do
          if [ -f "${example}/package.json" ]; then
            echo "Installing dependencies for ${example}"
            cd "$example"
            pnpm install --prefer-offline
            cd "$GITHUB_WORKSPACE"
          fi
        done
