name: Setup Node and pnpm
description: Sets up Node.js and pnpm with dependency caching

inputs:
  node-version:
    required: false
    description: "Node.js version"
    default: "24"

runs:
  using: "composite"
  steps:
    - name: 📦 Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.6.3
        run_install: false

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: "https://registry.npmjs.org"

    - name: 📦 Get pnpm store directory
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: 📦 Restore pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-

    - name: 📦 Install workspace dependencies
      shell: bash
      run: pnpm install --prefer-offline

    - name: 📦 Install standalone example dependencies
      shell: bash
      run: |
        standalone=(
          build-systems/nx-rspack-mf
          build-systems/turborepo-rspack-mf
          module-federation/airbnb-clone
          module-federation/react-vite-rspack-webpack
        )
        for example in "${standalone[@]}"; do
          if [ -f "${example}/package.json" ]; then
            echo "Installing dependencies for ${example}"
            cd "$example"
            pnpm install --prefer-offline
            cd "$GITHUB_WORKSPACE"
          fi
        done
